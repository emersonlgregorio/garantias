{% extends "app/base.html" %}
{% block page_title %}Empresa{% endblock %}
{% block content %}
  <section class="card card-pad">
    <form method="post" style="display:grid;gap:0.85rem;max-width:520px">
      {% csrf_token %}
      {{ form.as_p }}
      <div style="display:flex;gap:0.6rem;flex-wrap:wrap">
        <button class="btn btn-primary" type="submit">Salvar</button>
        <a class="btn btn-ghost" href="{% url 'admin_area' %}">Voltar</a>
      </div>
    </form>
  </section>
{% endblock %}
