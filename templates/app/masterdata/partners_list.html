{% extends "app/base.html" %}
{% block page_title %}Parceiros de Negócios{% endblock %}
{% block top_actions %}
  <a class="btn btn-primary" href="{% url 'app_partners_new' %}">Novo parceiro</a>
{% endblock %}
{% block content %}
  <section class="card card-pad">
    <div style="overflow:auto">
      <table style="width:100%;border-collapse:collapse;min-width:720px">
        <thead>
          <tr style="text-align:left;color:var(--text-muted);font-size:0.85rem">
            <th style="padding:0.6rem;border-bottom:1px solid var(--border)">Nome</th>
            <th style="padding:0.6rem;border-bottom:1px solid var(--border)">CNPJ</th>
            <th style="padding:0.6rem;border-bottom:1px solid var(--border)"></th>
          </tr>
        </thead>
        <tbody>
          {% for p in partners %}
            <tr>
              <td style="padding:0.7rem;border-bottom:1px solid var(--border)"><strong>{{ p.name }}</strong></td>
              <td style="padding:0.7rem;border-bottom:1px solid var(--border)">{{ p.cnpj }}</td>
              <td style="padding:0.7rem;border-bottom:1px solid var(--border);text-align:right">
                <a class="btn btn-ghost" style="padding:0.45rem 0.7rem" href="{% url 'app_partners_edit' p.id %}">Editar</a>
              </td>
            </tr>
          {% empty %}
            <tr><td colspan="3" style="padding:1rem;color:var(--text-muted)">Nenhum parceiro cadastrado.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </section>
{% endblock %}
