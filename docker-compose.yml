services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: garantias
      POSTGRES_PASSWORD: garantias
      POSTGRES_DB: garantias
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garantias -d garantias"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    command: >
      sh -c "until pg_isready -h db -p 5432 -U garantias; do sleep 1; done &&
             python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: dev-insecure-change-me
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,web
      DATABASE_URL: postgres://garantias:garantias@db:5432/garantias
      CORS_ALLOWED_ORIGINS: http://localhost:8000,http://127.0.0.1:8000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: {}
