# Build e push da imagem para o Docker Hub.
#
# Secrets (GitHub → Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME — seu usuário no Docker Hub
#   DOCKERHUB_TOKEN    — token em https://hub.docker.com/settings/security (recomendado; não use a senha da conta)
#
# Ajuste IMAGE abaixo se o repositório no Hub for outro.

name: Docker build and push

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

env:
  # Mesmo nome usado no docker-compose.prod.yml (GARANTIAS_IMAGE)
  IMAGE: emersonlgregorio/garantias

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
